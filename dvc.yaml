stages:
  process_data:
    cmd: python3 -m src.player_prediction.data.data_processing
    deps:
      - src/player_prediction/data/data_processing.py
      - configs/config.yaml
      - data/raw/fifa_world_cup_2026_player_performance.csv
    outs:
      - data/processed/train.csv
      - data/processed/validation.csv
      - data/processed/test.csv
