stages:
  process_data:
    cmd: python3 -m src.player_prediction.data.data_processing
    deps:
      - src/player_prediction/data/data_processing.py
      - configs/config.yaml
      - data/raw/fifa_world_cup_2026_player_performance.csv
    outs:
      - data/processed/train.csv
      - data/processed/validation.csv
      - data/processed/test.csv

  train:
    cmd: python3 -m src.player_prediction.models.train
    deps:
      - src/player_prediction/models/train.py
      - configs/config.yaml
      - params.yaml
      - data/processed/train.csv
    outs:
      - models/model.pkl
    params:
      -train.learning_rate
      -train.epochs
    metrics:
      - metrics.json:
          cache: false